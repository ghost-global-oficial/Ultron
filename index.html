<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Ultron - Moltbot Powered</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #000000;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        #terminal-container {
            flex: 1;
            padding: 40px 40px;
            overflow: hidden;
            background: transparent;
            max-width: 800px;
            margin: 0 auto;
            width: 100%;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
        }
        #config-content {
            width: 100%;
            max-width: 100%;
            overflow-y: auto;
            overflow-x: hidden;
            max-height: calc(100vh - 150px);
            padding-right: 10px;
            scrollbar-width: none; /* Firefox */
            -ms-overflow-style: none; /* IE and Edge */
        }
        #config-content::-webkit-scrollbar {
            display: none; /* Chrome, Safari, Opera */
        }

        .question {
            color: #ffffff;
            font-size: 24px;
            font-weight: 600;
            margin: 30px 0 20px 0;
            text-align: center;
        }
        p {
            color: rgba(255, 255, 255, 0.7);
            font-size: 15px;
            line-height: 1.6;
            text-align: center;
            margin: 10px 0;
        }
        strong {
            color: #ffffff;
            font-weight: 600;
        }
        small {
            color: rgba(255, 255, 255, 0.5);
            font-size: 13px;
        }
        .option {
            padding: 18px 24px;
            margin: 12px 0;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .option:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.4);
            box-shadow: 0 4px 20px rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }
        .option.selected {
            background: rgba(255, 255, 255, 0.15);
            border-color: #ffffff;
            box-shadow: 0 4px 25px rgba(255, 255, 255, 0.3);
        }
        .input-group {
            margin: 20px 0;
        }
        input[type="text"], input[type="number"], input[type="password"], select {
            width: 100%;
            padding: 14px 18px;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            font-size: 15px;
            margin-top: 8px;
        }
        input:focus, select:focus {
            outline: none;
            border-color: #ffffff;
            box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.1);
        }
        button {
            padding: 14px 32px;
            background: #ffffff;
            color: #000;
            border: none;
            border-radius: 8px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin: 10px 5px;
        }
        button:hover {
            background: #e0e0e0;
            box-shadow: 0 4px 20px rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
        }
        button.secondary {
            background: transparent;
            color: #ffffff;
            border: 2px solid rgba(255, 255, 255, 0.3);
        }
        button.secondary:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.5);
        }
        .status-bar {
            padding: 10px 20px;
            background: rgba(0, 0, 0, 0.9);
            border-top: 2px solid #ffffff;
            font-size: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .status-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #ffffff;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
        .hidden {
            display: none;
        }
        .success-message {
            color: #ffffff;
            background: rgba(255, 255, 255, 0.08);
            padding: 20px;
            border-radius: 12px;
            border-left: 4px solid #ffffff;
            margin: 20px 0;
        }
        .error-message {
            color: #ffffff;
            background: rgba(255, 255, 255, 0.1);
            padding: 20px;
            border-radius: 12px;
            border-left: 4px solid #ffffff;
            margin: 20px 0;
        }
        .loading {
            display: inline-block;
            animation: dots 1.5s infinite;
        }
        @keyframes dots {
            0%, 20% { content: '.'; }
            40% { content: '..'; }
            60%, 100% { content: '...'; }
        }
    </style>
</head>
<body>
    <div id="terminal-container">
        <div id="config-content"></div>
    </div>
    
    <div class="status-bar">
        <div class="status-indicator">
            <div class="status-dot"></div>
            <span id="status-text">Sistema pronto</span>
        </div>
        <div>v1.0.0 | ULTRON Gateway</div>
    </div>

    <script src="i18n.js"></script>
    <script src="renderer.js"></script>
</body>
</html>
